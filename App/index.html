<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VX Link Helper App - Mobile Web Converter</title>
  <meta name="description" content="VX Link Helper mobile web app: paste, convert, copy, and debug clean social links on iOS and Android browsers.">
  <meta name="theme-color" content="#070b14">
  <meta name="color-scheme" content="dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VX Link">
  <meta name="application-name" content="VX Link Helper">
  <link rel="manifest" href="manifest.webmanifest?v=20260629-safearea">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=20260629-safearea">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png?v=20260629-safearea">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png?v=20260629-safearea">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png?v=20260629-safearea">
  <link rel="stylesheet" href="styles.css?v=20260629-safearea">
</head>
<body>
  <div class="background-tech" aria-hidden="true"><span></span><span></span><span></span></div>
  <header class="app-header">
    <a class="brand" href="../index.html" aria-label="Back to VX Link Helper home">
      <img src="../icon128.png" alt="" class="brand-icon">
      <span>VX Link Helper</span>
    </a>
    <label class="lang-control" for="langSelect">
      <span data-i18n="languageLabel">语言</span>
      <select id="langSelect" aria-label="Language">
        <option value="en">English</option><option value="zh">简体中文</option><option value="zh-TW">繁體中文</option><option value="es">Español</option><option value="ar">العربية</option><option value="pt">Português</option><option value="fr">Français</option><option value="ja">日本語</option>
      </select>
    </label>
  </header>

  <main id="appShell" class="app-shell">
    <section class="tab-page active" data-page="convert">
      <section class="hero-card glass-card compact-hero">
        <p class="eyebrow">Mobile Web App · iOS / Android</p>
        <h1 data-i18n="heroTitle">手机端 VX 链接转换器</h1>
        <p class="subtitle" data-i18n="heroSubtitle">粘贴、转换、复制、历史和调试都在浏览器本地完成。</p>
      </section>

      <section class="glass-card converter-card" aria-labelledby="convert-title">
        <div class="section-head">
          <div><p class="eyebrow">Convert</p><h2 id="convert-title" data-i18n="convertTitle">剪贴板转换</h2></div>
          <span id="capabilityBadge" class="status-pill">checking</span>
        </div>
        <div id="clipboardHint" class="hint-card" data-i18n="clipboardHint">点击按钮读取剪贴板并转换。Web 端不能稳定后台读取剪贴板。</div>
        <div class="button-row primary-actions">
          <button id="pasteConvertBtn" class="primary-btn" type="button" data-i18n="pasteConvert">读取剪贴板并转换</button>
          <button id="convertInputBtn" class="secondary-btn" type="button" data-i18n="convertInput">转换输入框</button>
        </div>
        <label class="input-label" for="sourceInput" data-i18n="manualInput">手动输入</label>
        <textarea id="sourceInput" rows="4" spellcheck="false" placeholder="https://x.com/user/status/123?s=20&utm_source=share"></textarea>
        <div id="resultCard" class="result-card" hidden>
          <div class="result-meta"><span id="siteBadge" class="site-badge">Site</span><span id="cleanedCount">0 params cleaned</span></div>
          <div class="url-block bad"><span data-i18n="original">原始链接</span><code id="originalUrl"></code></div>
          <div class="flow-arrow">↓</div>
          <div class="url-block good"><span data-i18n="converted">转换结果</span><code id="convertedUrl"></code></div>
          <p id="resultNote" class="result-note" hidden></p>
          <div class="button-row compact">
            <button id="copyBtn" class="primary-btn" type="button" data-i18n="copyResult">复制结果</button>
            <button id="saveBtn" class="secondary-btn" type="button" data-i18n="saveResult">保存历史</button>
            <button id="webShareBtn" class="secondary-btn" type="button" data-i18n="shareResult">系统分享</button>
            <a id="openBtn" class="secondary-link" href="#" target="_blank" rel="noopener" data-i18n="openResult">打开</a>
          </div>
        </div>
      </section>
    </section>

    <section class="tab-page" data-page="history">
      <section class="glass-card" aria-labelledby="history-title">
        <div class="section-head"><div><p class="eyebrow">History</p><h2 id="history-title" data-i18n="historyTitle">转换历史</h2></div><button id="clearHistoryBtn" class="ghost-btn danger" type="button" data-i18n="clearHistory">清空</button></div>
        <div id="historyList" class="history-list"></div>
      </section>
    </section>

    <section class="tab-page" data-page="settings">
      <section class="glass-card" aria-labelledby="settings-title">
        <p class="eyebrow">Settings</p><h2 id="settings-title" data-i18n="settingsTitle">设置</h2>
        <div class="settings-list">
          <fieldset class="setting-group"><legend data-i18n="modeTitle">剪贴板模式</legend>
            <label class="setting-row"><span data-i18n="modeManual">手动模式</span><input type="radio" name="mode" value="manual"></label>
            <label class="setting-row"><span data-i18n="modeRecommended">推荐模式</span><input type="radio" name="mode" value="recommended" checked></label>
            <label class="setting-row"><span data-i18n="modeFast">快捷模式</span><input type="radio" name="mode" value="fast"></label>
          </fieldset>
          <label class="setting-row"><span data-i18n="saveHistory">保存历史</span><input id="saveHistory" type="checkbox" checked></label>
          <label class="setting-row"><span data-i18n="convertedOnly">仅保存转换后链接</span><input id="convertedOnly" type="checkbox"></label>
          <label class="setting-row"><span>X / Twitter</span><input id="siteX" type="checkbox" checked></label>
          <div class="setting-row site-setting">
            <div class="setting-main"><span>Reddit</span><input id="siteReddit" type="checkbox" checked></div>
            <label class="nested-select"><span data-i18n="redditDomain">Reddit 域名</span><select id="redditDomain"><option value="vxreddit.com">vxreddit.com</option><option value="rxddit.com">rxddit.com</option></select></label>
          </div>
          <label class="setting-row"><span>Bilibili / b23.tv</span><input id="siteBilibili" type="checkbox" checked></label>
          <label class="setting-row"><span>Pixiv</span><input id="sitePixiv" type="checkbox" checked></label>
          <a class="secondary-link full-link" href="../index.html" target="_blank" rel="noopener" data-i18n="openHome">打开项目主页</a>
        </div>
      </section>
    </section>

    <section class="tab-page" data-page="debug">
      <section id="debugPanel" class="glass-card debug-panel">
        <div class="section-head"><div><p class="eyebrow">Debug</p><h2 data-i18n="debugTitle">调试面板</h2></div><button id="runSelfTestBtn" class="secondary-btn" type="button">Self-test</button></div>
        <pre id="debugOutput"></pre>
      </section>
    </section>
  </main>

  <nav class="bottom-tabs" aria-label="Mobile sections">
    <button class="active" type="button" data-tab="convert" data-i18n="tabConvert">转换</button>
    <button type="button" data-tab="history" data-i18n="tabHistory">历史</button>
    <button type="button" data-tab="settings" data-i18n="tabSettings">设置</button>
    <button type="button" data-tab="debug" data-i18n="tabDebug">调试</button>
  </nav>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <script src="app.js?v=20260629-safearea"></script>
</body>
</html>
